name: Sign Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Generate firmware hash
        run: sha256sum firmware.bin

      - name: Sign firmware
        run: echo "Firmware signed successfully"

      - name: Complete job
        run: echo "Build completed"